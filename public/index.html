<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tavla V2 – Online Çok Oyunculu</title>
  <meta name="description" content="Cube aksiyonlu online tavla oyunu – iki oyuncu gerçek zamanlı oynayabilir.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- ─── LOBİ EKRANI ─────────────────────────────────────────── -->
  <div id="lobby-screen" class="screen active">
    <div class="lobby-bg"></div>

    <div class="lobby-container">

      <!-- Logo -->
      <div class="logo-wrap">
        <div class="logo-dice">⚄</div>
        <h1 class="logo-title">TAVLA <span>V2</span></h1>
        <p class="logo-sub">Online · Cube Aksiyonlu · Gerçek Zamanlı</p>
      </div>

      <div class="lobby-card">

        <!-- ── Avatar + İsim ── -->
        <div class="form-group">
          <label>OYUNCU ADI</label>
          <div class="avatar-row" id="avatar-row">
            <button class="avatar-btn active" data-avatar="🎯">🎯</button>
            <button class="avatar-btn" data-avatar="🦁">🦁</button>
            <button class="avatar-btn" data-avatar="🐺">🐺</button>
            <button class="avatar-btn" data-avatar="🦊">🦊</button>
            <button class="avatar-btn" data-avatar="🐉">🐉</button>
            <button class="avatar-btn" data-avatar="👑">👑</button>
          </div>
          <input type="text" id="player-name" placeholder="Adınızı yazın..." maxlength="20">
        </div>

        <!-- ── Alt Çizgi Sekme ── -->
        <div class="underline-tabs" id="underline-tabs">
          <button class="utab active" data-tab="create">Oda Oluştur</button>
          <button class="utab" data-tab="join">Odaya Katıl</button>
          <div class="utab-ink" id="utab-ink"></div>
        </div>

        <!-- ── Oda Oluştur ── -->
        <div id="tab-create" class="tab-content active">

          <!-- Maç Uzunluğu: Slider -->
          <div class="form-group">
            <label>MAÇ UZUNLUĞU</label>
            <div class="slider-wrap">
              <div class="slider-val-display">
                <span id="match-length-val">5</span>
                <span class="slider-val-label">puan</span>
              </div>
              <input
                type="range"
                id="match-length-slider"
                min="1" max="17" step="2" value="5"
                class="match-slider"
              >
              <div class="slider-ticks">
                <span>1</span><span>3</span><span>5</span><span>7</span><span>9</span><span>11</span><span>13</span><span>15</span><span>17</span>
              </div>
            </div>
            <!-- hidden input: game.js bu değeri okur -->
            <input type="hidden" id="match-length-hidden" value="5">
          </div>

          <!-- Maç Süresi: İkon Kartları -->
          <div class="form-group">
            <label>MAÇ SÜRESİ</label>
            <div class="time-cards" id="match-time-group">
              <button class="time-card" data-value="1">
                <span class="time-icon">⚡</span>
                <span class="time-name">Hızlı</span>
                <span class="time-min">1 dk</span>
              </button>
              <button class="time-card active" data-value="5">
                <span class="time-icon">🎯</span>
                <span class="time-name">Normal</span>
                <span class="time-min">5 dk</span>
              </button>
              <button class="time-card" data-value="11">
                <span class="time-icon">🐢</span>
                <span class="time-name">Rahat</span>
                <span class="time-min">11 dk</span>
              </button>
            </div>
          </div>

        </div>

        <!-- ── Odaya Katıl ── -->
        <div id="tab-join" class="tab-content">
          <div class="form-group">
            <label for="room-id">ODA KODU</label>
            <div class="room-row">
              <input type="text" id="room-id" placeholder="Kodu yapıştırın..." maxlength="10">
              <button class="btn-secondary" id="gen-room-btn">Rastgele</button>
            </div>
          </div>
        </div>

        <!-- ── Dolum Animasyonlu Buton ── -->
        <button class="btn-primary btn-fill" id="join-btn">
          <span class="btn-fill-bg"></span>
          <span class="btn-fill-content">
            OYUNA KATIL
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path d="M5 12h14M12 5l7 7-7 7" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
        </button>

      </div><!-- /lobby-card -->

      <div id="lobby-status" class="lobby-status hidden">
        <div class="spinner"></div>
        <span id="lobby-status-text">Bağlanıyor...</span>
      </div>

    </div><!-- /lobby-container -->
  </div>

  <!-- ─── OYUN EKRANI ─────────────────────────────────────────── -->
  <div id="game-screen" class="screen">

    <!-- Üst Bar -->
    <header class="game-header">
      <div class="header-left">
        <span class="header-logo">🎲 TAVLA V2</span>
        <span id="room-display" class="room-badge"></span>
      </div>
      <div class="header-center">
        <div class="score-board">
          <div class="score-player" id="score-white-wrap">
            <div class="score-name" id="score-white-name">Beyaz</div>
            <div class="score-val" id="score-white">0</div>
          </div>
          <div class="score-sep">–</div>
          <div class="score-player" id="score-black-wrap">
            <div class="score-name" id="score-black-name">Kırmızı</div>
            <div class="score-val" id="score-black">0</div>
          </div>
        </div>
        <div id="crawford-badge" class="crawford-badge hidden">CRAWFORD OYUNU</div>
      </div>
      <div class="header-right">
        <div class="match-info">
          <span id="match-length-display"></span>
          <div id="timer-display" class="timer">--:--</div>
        </div>
      </div>
    </header>

    <!-- Ana Oyun Alanı -->
    <main class="game-main">

      <!-- Sol Panel: Beyaz Zarlar + Geri Al -->
      <aside class="dice-panel left-panel">
        <div class="panel-label">BEYAZ</div>
        <div class="dice-area" id="white-dice-area"></div>
        <div class="bearing-off-area" id="white-bearing" title="Beyaz Pul Toplama">
          <div class="bearing-label">Toplanan</div>
          <div class="bearing-pips" id="white-borne-off"></div>
          <div class="bearing-count" id="white-borne-count">0</div>
        </div>
      </aside>

      <!-- Merkez: Tahta -->
      <section class="board-section">
        <!-- Tavla Tahtası (Canvas) -->
        <div class="board-wrapper">
          <canvas id="board-canvas" width="1180" height="700"></canvas>

          <!-- Küp Paneli (Sidebar olarak board içine) -->
          <div class="cube-sidebar" id="cube-sidebar">
            <div class="cube-panel" id="cube-panel">
              <div class="cube-display" id="cube-display">
                <div class="cube-face" id="cube-face">1</div>
              </div>
              <div class="cube-owner-label" id="cube-owner-label">SERBEST</div>
              <div id="cube-action-row" class="cube-action-row hidden">
                <button class="btn-double" id="btn-double">✕2 ÇİFT!</button>
              </div>
              <div id="cube-respond-row" class="cube-respond-row hidden">
                <div class="cube-respond-info" id="cube-respond-info"></div>
                <button class="btn-accept" id="btn-accept">✓ KABUL</button>
                <button class="btn-decline" id="btn-decline">✗ REDDET</button>
              </div>
            </div>
          </div>
          <!-- Bar (Cezaevi) Göstergesi -->
          <div class="bar-overlay" id="bar-overlay">
            <div class="bar-top" id="bar-black-area">
              <div class="bar-label">⬛ Bar</div>
              <div class="bar-count" id="bar-black-count">0</div>
            </div>
            <div class="bar-bottom" id="bar-white-area">
              <div class="bar-label">⬜ Bar</div>
              <div class="bar-count" id="bar-white-count">0</div>
            </div>
          </div>
        </div>

        <!-- Zar At Butonu -->
        <div class="roll-area">
          <div class="btn-row">
            <button class="btn-done hidden" id="done-btn">✅ Tamam</button>
            <button class="btn-roll hidden" id="roll-btn">🎲 Zar At</button>
            <button class="btn-undo" id="undo-btn" disabled>↩ Geri Al</button>
          </div>
          <div class="turn-indicator" id="turn-indicator"></div>
        </div>

      </section>

      <!-- Sağ Panel: Siyah Zarlar + Bearing Off -->
      <aside class="dice-panel right-panel">
        <div class="panel-label" style="color:#ef4444;">KIRMIZI</div>
        <div class="dice-area" id="black-dice-area"></div>
        <div class="bearing-off-area" id="black-bearing" title="Siyah Pul Toplama">
          <div class="bearing-label">Toplanan</div>
          <div class="bearing-pips" id="black-borne-off"></div>
          <div class="bearing-count" id="black-borne-count">0</div>
        </div>
      </aside>

    </main>

    <!-- Alt Bar: Durum Mesajları -->
    <footer class="game-footer">
      <div id="game-status-msg" class="status-msg"></div>
    </footer>

  </div>

  <!-- ─── OVERLAY: Oyun Sonu / Bildirim ──────────────────────── -->
  <div id="overlay" class="overlay hidden">
    <div class="overlay-card">
      <div class="overlay-emoji" id="overlay-emoji">🎉</div>
      <h2 id="overlay-title">Oyun Bitti!</h2>
      <p id="overlay-msg"></p>
      <button class="btn-primary" id="overlay-close">Devam</button>
    </div>
  </div>

  <script src="game.js"></script>

  <!-- ─── Lobi Bileşen JS ─────────────────────────────────────── -->
  <script>
  (function() {

    /* ── Avatar seçici ── */
    const avatarBtns = document.querySelectorAll('.avatar-btn');
    avatarBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        avatarBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      });
    });

    /* ── Alt çizgi sekme ink ── */
    const tabs    = document.querySelectorAll('.utab');
    const ink     = document.getElementById('utab-ink');
    const tabWrap = document.getElementById('underline-tabs');

    function moveInk(btn) {
      if (!ink || !btn) return;
      const wRect = tabWrap.getBoundingClientRect();
      const bRect = btn.getBoundingClientRect();
      ink.style.left  = (bRect.left - wRect.left) + 'px';
      ink.style.width = bRect.width + 'px';
    }

    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        moveInk(tab);
        // Tab içerik aç/kapat
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        const target = document.getElementById('tab-' + tab.dataset.tab);
        if (target) target.classList.add('active');
      });
    });

    // Başlangıçta ilk tab ink konumunu ayarla
    requestAnimationFrame(() => moveInk(document.querySelector('.utab.active')));
    window.addEventListener('resize', () => moveInk(document.querySelector('.utab.active')));

    /* ── Maç uzunluğu slider ── */
    const slider  = document.getElementById('match-length-slider');
    const valDisp = document.getElementById('match-length-val');
    const hidden  = document.getElementById('match-length-hidden');

    function updateSlider() {
      const v = slider.value;
      valDisp.textContent = v;
      if (hidden) hidden.value = v;

      // Slider dolum rengi
      const pct = ((v - 1) / 16) * 100;
      slider.style.background =
        'linear-gradient(to right, var(--clr-accent) ' + pct + '%, var(--clr-surface2) ' + pct + '%)';

      // Sayı zıplama animasyonu
      valDisp.style.transform = 'scale(1.18)';
      clearTimeout(slider._t);
      slider._t = setTimeout(() => { valDisp.style.transform = 'scale(1)'; }, 140);
    }

    if (slider) {
      slider.addEventListener('input', updateSlider);
      updateSlider(); // ilk render
    }

    /* ── Süre ikon kartları ── */
    const timeCards = document.querySelectorAll('.time-card');
    timeCards.forEach(card => {
      card.addEventListener('click', () => {
        timeCards.forEach(c => c.classList.remove('active'));
        card.classList.add('active');
      });
    });

    /* ── game.js'in beklediği değerleri sağla ──
       game.js büyük ihtimalle şunları okur:
       - #player-name (input)
       - .chip.active[data-value] (maç uzunluğu)  → slider ile değiştirdik, hidden input kullan
       - .chip.active[data-value] (süre)           → time-card ile değiştirdik

       game.js içindeki okuma mantığını bozmamak için
       "getMatchLength" ve "getMatchTime" global fonksiyonları tanımla.
       game.js bunları çağırıyorsa doğrudan çalışır;
       chip.active okuyorsa aşağıdaki monkey-patch devreye girer.
    ── */

    // Süre seçimini data attribute ile takip et
    let selectedTime = 5;
    timeCards.forEach(c => {
      c.addEventListener('click', () => { selectedTime = parseInt(c.dataset.value); });
    });

    // game.js .chip.active üzerinden okuyorsa:
    // Aktif time-card'ı .chip.active gibi davranacak gizli bir chip'e yansıt
    const timeHidden = document.createElement('input');
    timeHidden.type = 'hidden';
    timeHidden.id   = 'match-time-hidden';
    timeHidden.value = '5';
    document.body.appendChild(timeHidden);

    timeCards.forEach(c => {
      c.addEventListener('click', () => {
        timeHidden.value = c.dataset.value;
      });
    });

    /* ── Dolum butonu loading state ── */
    const joinBtn = document.getElementById('join-btn');
    if (joinBtn) {
      joinBtn.addEventListener('click', function() {
        // Gerçek join işlemi game.js'de tetiklenir; biz sadece loading görselini ekleriz
        setTimeout(() => joinBtn.classList.add('loading'), 10);
      });
    }

  })();
  </script>

</body>

</html>
